- name: Assert new-cluster credentials were extracted
  ansible.builtin.assert:
    that:
      - _argocd_sa_token is defined
      - _argocd_sa_token | length > 0
      - _argocd_ca_data is defined
      - _argocd_ca_data | length > 0
    fail_msg: >-
      _argocd_sa_token and _argocd_ca_data must be set before enrolling the
      cluster in the parent ArgoCD. Ensure argocd-enroll-new-cluster.yaml ran
      successfully.
  no_log: true

- name: Apply ArgoCD cluster Secret to parent cluster
  kubernetes.core.k8s:
    kubeconfig: "{{ argocd_parent_kubeconfig }}"
    definition: "{{ lookup('ansible.builtin.template', playbook_dir + '/templates/argocd/cluster-secret.yaml.j2') | from_yaml }}"

- name: Read bootstrap-prod Application state on parent cluster
  kubernetes.core.k8s_info:
    kubeconfig: "{{ argocd_parent_kubeconfig }}"
    api_version: argoproj.io/v1alpha1
    kind: Application
    name: bootstrap-prod
    namespace: argocd
  register: _bootstrap_prod_app

- name: Apply bootstrap-prod Application to parent cluster
  kubernetes.core.k8s:
    kubeconfig: "{{ argocd_parent_kubeconfig }}"
    definition: "{{ lookup('ansible.builtin.template', playbook_dir + '/templates/argocd/bootstrap-roots/prod.yaml.j2') | from_yaml }}"
  when: (_bootstrap_prod_app.resources | default([]) | length) == 0

- name: Wait for bootstrap-prod Application to be Healthy and Synced on parent
  kubernetes.core.k8s_info:
    kubeconfig: "{{ argocd_parent_kubeconfig }}"
    api_version: argoproj.io/v1alpha1
    kind: Application
    name: bootstrap-prod
    namespace: argocd
  register: _bootstrap_prod_status
  until: >
    _bootstrap_prod_status.resources | length > 0 and
    _bootstrap_prod_status.resources[0].status is defined and
    _bootstrap_prod_status.resources[0].status.health is defined and
    _bootstrap_prod_status.resources[0].status.health.status == 'Healthy' and
    _bootstrap_prod_status.resources[0].status.sync.status == 'Synced'
  retries: 80
  delay: 15
