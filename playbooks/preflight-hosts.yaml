- name: Wait for SSH port to be reachable
  ansible.builtin.wait_for:
    host: "{{ ansible_host }}"
    port: 22
    timeout: 300
  delegate_to: localhost
  become: false

- name: Refresh host key  # pass -e refresh_host_keys=true after rebuilding VMs
  when: refresh_host_keys | default(false) | bool
  block:
    - name: Check if known_hosts.old backup exists
      ansible.builtin.stat:
        path: ~/.ssh/known_hosts.old
      register: _known_hosts_old
      delegate_to: localhost
      become: false
      run_once: true

    - name: Prompt to remove known_hosts.old backup
      ansible.builtin.pause:
        prompt: "known_hosts.old backup exists from a previous run. Remove it? [yes/no]"
      register: _remove_backup_prompt
      when:
        - _known_hosts_old.stat.exists
        - remove_known_hosts_backup is not defined
      delegate_to: localhost
      become: false
      run_once: true

    - name: Remove known_hosts.old backup
      ansible.builtin.file:
        path: ~/.ssh/known_hosts.old
        state: absent
      delegate_to: localhost
      become: false
      run_once: true
      when:
        - _known_hosts_old.stat.exists
        - >-
          (remove_known_hosts_backup is defined and remove_known_hosts_backup | bool) or
          (_remove_backup_prompt is not skipped and _remove_backup_prompt.user_input | lower in ['yes', 'y'])

    - name: Remove stale known_hosts entry
      ansible.builtin.known_hosts:
        name: "{{ ansible_host }}"
        state: absent
      delegate_to: localhost
      become: false

    - name: Scan and accept fresh host key
      ansible.builtin.shell: ssh-keyscan -H "{{ ansible_host }}" >> ~/.ssh/known_hosts
      delegate_to: localhost
      become: false
      changed_when: true

- name: Verify SSH authentication
  ansible.builtin.ping:

- name: Check cloud-init presence
  ansible.builtin.shell: command -v cloud-init
  register: cloud_init_binary
  changed_when: false
  failed_when: false

- name: Gather service facts
  ansible.builtin.service_facts:

- name: Check /etc/fstab presence
  ansible.builtin.stat:
    path: /etc/fstab
  register: fstab_file

- name: Assert bootstrap prerequisites exist on the host
  ansible.builtin.assert:
    that:
      - cloud_init_binary.rc == 0
      - "'NetworkManager.service' in ansible_facts.services"
      - fstab_file.stat.exists
    fail_msg: >-
      Host `{{ inventory_hostname }}` is missing a prerequisite expected by the
      bootstrap playbook (`cloud-init`, `NetworkManager`, or `/etc/fstab`).
