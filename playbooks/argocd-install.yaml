- name: Clone infra-helm
  ansible.builtin.git:
    repo: "https://x-access-token:{{ github_pat }}@{{ infra_helm_repo | regex_replace('^https://', '') }}"
    dest: "{{ infra_helm_path }}"
    version: "{{ infra_helm_revision }}"
    force: true
  no_log: true

- name: Update Helm chart dependencies
  ansible.builtin.command:
    cmd: helm dependency update
    chdir: "{{ infra_helm_path }}/ArgoCD"
  changed_when: true

- name: Render stub ArgoCD values
  ansible.builtin.template:
    src: "{{ playbook_dir }}/templates/argocd/values.bootstrap.yaml.j2"
    dest: "{{ bootstrap_artifact_dir }}/values.bootstrap.yaml"
    mode: '0600'

- name: Install stub ArgoCD
  kubernetes.core.helm:
    kubeconfig: "{{ kubeconfig }}"
    name: argocd
    chart_ref: "{{ infra_helm_path }}/ArgoCD"
    release_namespace: argocd
    create_namespace: true
    values_files:
      - "{{ bootstrap_artifact_dir }}/values.bootstrap.yaml"
    wait: true
    wait_timeout: 300s

- name: Fetch GitHub App credentials from Vault
  ansible.builtin.set_fact:
    _argocd_vault_creds: "{{ lookup('community.hashi_vault.hashi_vault',
      vault_argocd_secret_path,
      token=vault_token,
      url=vault_addr) }}"
  no_log: true

- name: Apply ArgoCD repository secret
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig }}"
    definition: "{{ lookup('ansible.builtin.template', playbook_dir + '/templates/argocd/repo-secret.yaml.j2') | from_yaml }}"

- name: Apply bootstrap root Application
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig }}"
    definition: "{{ lookup('ansible.builtin.template', playbook_dir + '/templates/argocd/bootstrap-roots/tools.yaml.j2') | from_yaml }}"
