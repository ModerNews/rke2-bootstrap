- name: Clone infra-helm
  ansible.builtin.git:
    repo: "https://x-access-token:{{ github_pat }}@{{ infra_helm_repo | regex_replace('^https://', '') }}"
    dest: "{{ infra_helm_path }}"
    version: "{{ infra_helm_revision }}"
    force: true
  no_log: true

- name: Update Helm chart dependencies
  ansible.builtin.command:
    cmd: helm dependency update
    chdir: "{{ infra_helm_path }}/ArgoCD"
  changed_when: true

- name: Render stub ArgoCD values
  ansible.builtin.template:
    src: "{{ playbook_dir }}/templates/argocd/values.bootstrap.yaml.j2"
    dest: "{{ bootstrap_artifact_dir }}/values.bootstrap.yaml"
    mode: '0600'

- name: Create argocd namespace
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig }}"
    api_version: v1
    kind: Namespace
    name: argocd
    state: present

- name: Generate server.secretkey
  ansible.builtin.set_fact:
    argocd_server_secretkey: "{{ lookup('community.general.random_string', length=32, base64=true) }}"
  no_log: true

- name: Write server.secretkey to Vault
  community.hashi_vault.vault_kv2_write:
    url: "{{ vault_addr }}"
    token: "{{ vault_token }}"
    engine_mount_point: "{{ vault_kv_mount }}"
    path: "{{ vault_argocd_secret_path }}"
    data:
      server.secretkey: "{{ argocd_server_secretkey }}"
  no_log: true

- name: Pre-create argocd-secret without Helm ownership
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig }}"
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: argocd-secret
        namespace: argocd
      type: Opaque
      stringData:
        server.secretkey: "{{ argocd_server_secretkey }}"
  no_log: true

- name: Install stub ArgoCD
  ansible.builtin.command:
    argv:
      - helm
      - upgrade
      - --install
      - argocd
      - "{{ infra_helm_path }}/ArgoCD"
      - --namespace
      - argocd
      - --create-namespace
      - --values
      - "{{ bootstrap_artifact_dir }}/values.bootstrap.yaml"
      - --kubeconfig
      - "{{ kubeconfig }}"
      - --wait
      - --timeout
      - 300s
  changed_when: true

- name: Fetch GitHub App credentials from Vault
  ansible.builtin.set_fact:
    _argocd_vault_creds: "{{ lookup('community.hashi_vault.hashi_vault',
      vault_github_app_path,
      token=vault_token,
      url=vault_addr) }}"
  no_log: true

- name: Apply ArgoCD repository secret
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig }}"
    definition: "{{ lookup('ansible.builtin.template', playbook_dir + '/templates/argocd/repo-secret.yaml.j2') | from_yaml }}"

- name: Apply bootstrap root Application
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig }}"
    definition: "{{ lookup('ansible.builtin.template', playbook_dir + '/templates/argocd/bootstrap-roots/tools.yaml.j2') | from_yaml }}"
