# Connection
ansible_user: wms
ansible_ssh_private_key_file: ~/.ssh/id_bastion

# Local bootstrap artifacts — written from master-init, used by follow-up stages on localhost
bootstrap_artifact_dir: "{{ playbook_dir }}/.artifacts"
kubeconfig: "{{ bootstrap_artifact_dir }}/kubeconfig"
rke2_token_local_path: "{{ bootstrap_artifact_dir }}/node-token"

# --- VIP & API ---
rke2_vip: VIP_IP
rke2_api_fqdn: api.tools.k8s.internal.wmsdev.pl

# --- Master IPs (for tls-san) ---
rke2_master_ips:
  - MASTER1_IP
  - MASTER2_IP
  - MASTER3_IP

# --- Cluster networking ---
rke2_cluster_domain: tools.k8s.internal.wmsdev.pl
rke2_cluster_cidr: CLUSTER_CIDR    # e.g. 10.42.0.0/16
rke2_service_cidr: SERVICE_CIDR    # e.g. 10.43.0.0/16

# --- VIP interface ---
vip_interface: eth0
vip_prefix: 24

# --- Vault ---
vault_addr: https://vault.internal.wmsdev.pl
vault_kv_mount: secret
vault_github_app_path: argocd/github-app       # GitHub App credentials for infra-helm repo access
vault_argocd_secret_path: argocd/argocd-secret # ArgoCD server secret (OIDC, Slack, secretkey)
# vault_token: passed at runtime via -e vault_token=...

# --- GitHub ---
# github_pat: passed at runtime via -e github_pat=...
infra_helm_repo: https://github.com/WMS-DEV/infra-helm.git
infra_helm_revision: main
infra_helm_path: "{{ bootstrap_artifact_dir }}/infra-helm"

# --- ArgoCD enrollment ---
# Parent ArgoCD cluster kubeconfig — path to kubeconfig for the cluster hosting ArgoCD
# argocd_parent_kubeconfig: passed at runtime via -e or set here

# Cluster group label for the ArgoCD cluster Secret
argocd_cluster_group: prod

# --- Component versions ---
cilium_version: "1.18.2"
kube_vip_version: "v0.8.0"
