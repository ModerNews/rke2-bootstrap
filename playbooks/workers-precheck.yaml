- name: Check local kubeconfig artifact
  ansible.builtin.stat:
    path: "{{ kubeconfig }}"
  register: worker_kubeconfig_stat
  delegate_to: localhost
  become: false

- name: Check local token artifact
  ansible.builtin.stat:
    path: "{{ rke2_token_local_path }}"
  register: worker_token_stat
  delegate_to: localhost
  become: false

- name: Assert worker join artifacts exist locally
  ansible.builtin.assert:
    that:
      - worker_kubeconfig_stat.stat.exists
      - worker_token_stat.stat.exists
    fail_msg: >-
      Worker join artifacts are missing locally. Run `master_init` first, then refresh bootstrap artifacts before
      joining workers.

- name: Wait for RKE2 registration endpoint on the VIP
  ansible.builtin.wait_for:
    host: "{{ rke2_vip }}"
    port: 9345
    timeout: 120
  delegate_to: localhost
  become: false
