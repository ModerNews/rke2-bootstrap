- name: Assert required inventory groups exist
  ansible.builtin.assert:
    that:
      - groups['kube-masters'] is defined
      - groups['kube-workers'] is defined
      - (groups['kube-masters'] | length) > 0
    fail_msg: >-
      Inventory must define `kube-masters` and `kube-workers`, with at least one
      control-plane node in `kube-masters`.

- name: Build cluster inventory facts
  ansible.builtin.set_fact:
    rke2_cluster_hosts: "{{ groups['kube-masters'] + groups['kube-workers'] }}"
    rke2_master_node_ips: "{{ groups['kube-masters'] | map('extract', hostvars, 'rke2_node_ip') | list }}"
    rke2_cluster_node_ips: "{{ (groups['kube-masters'] + groups['kube-workers']) | map('extract', hostvars, 'rke2_node_ip') | list }}"
    rke2_cluster_ansible_hosts: "{{ (groups['kube-masters'] + groups['kube-workers']) | map('extract', hostvars, 'ansible_host') | list }}"

- name: Assert inventory hostnames are unique
  ansible.builtin.assert:
    that:
      - (rke2_cluster_hosts | unique | length) == (rke2_cluster_hosts | length)
    fail_msg: >-
      Inventory hostnames must be unique across the whole bootstrap inventory.

- name: Assert shared bootstrap variables are populated
  ansible.builtin.assert:
    that:
      - (item.value | string | trim | length) > 0
      - not ((item.value | string) is match('^[A-Z][A-Z0-9_]*$'))
    fail_msg: "Variable `{{ item.name }}` is unset or still uses a placeholder value."
  loop:
    - { name: rke2_vip, value: "{{ rke2_vip }}" }
    - { name: rke2_api_fqdn, value: "{{ rke2_api_fqdn }}" }
    - { name: rke2_cluster_domain, value: "{{ rke2_cluster_domain }}" }
    - { name: vip_interface, value: "{{ vip_interface }}" }

- name: Assert bootstrap network values are well formed
  ansible.builtin.assert:
    that:
      - rke2_vip is match('^\d+\.\d+\.\d+\.\d+$')
      - rke2_cluster_cidr is match('^\d+\.\d+\.\d+\.\d+/\d+$')
      - rke2_service_cidr is match('^\d+\.\d+\.\d+\.\d+/\d+$')
      - (vip_prefix | string) is match('^\d+$')
    fail_msg: >-
      `rke2_vip`, `rke2_cluster_cidr`, `rke2_service_cidr`, and `vip_prefix`
      must be populated with proper CIDR values.

- name: Assert per-host connection variables are populated
  ansible.builtin.assert:
    that:
      - hostvars[item].ansible_host is defined
      - hostvars[item].rke2_node_ip is defined
      - (hostvars[item].ansible_host | string | trim | length) > 0
      - (hostvars[item].rke2_node_ip | string | trim | length) > 0
      - not ((hostvars[item].ansible_host | string) is match('^[A-Z][A-Z0-9_]*$'))
      - (hostvars[item].rke2_node_ip | string) is match('^\d+\.\d+\.\d+\.\d+$')
    fail_msg: >-
      Host `{{ item }}` must define concrete `ansible_host` and `rke2_node_ip`
      values before bootstrap starts.
  loop: "{{ rke2_cluster_hosts }}"

- name: Assert cluster addresses are unique
  ansible.builtin.assert:
    that:
      - (rke2_cluster_node_ips | unique | length) == (rke2_cluster_node_ips | length)
      - (rke2_cluster_ansible_hosts | unique | length) == (rke2_cluster_ansible_hosts | length)
      - rke2_vip not in rke2_cluster_node_ips
    fail_msg: >-
      Node IPs, Ansible connection targets, and the VIP must all be unique.

- name: Assert control-plane TLS SAN list matches control-plane inventory
  ansible.builtin.assert:
    that:
      - (rke2_master_ips | length) == (groups['kube-masters'] | length)
      - (rke2_master_ips | unique | length) == (rke2_master_ips | length)
      - (rke2_master_ips | reject('match', '^[A-Z][A-Z0-9_]*$') | list | length) == (rke2_master_ips | length)
      - (rke2_master_ips | sort) == (rke2_master_node_ips | sort)
    fail_msg: >-
      `rke2_master_ips` must contain the concrete `rke2_node_ip` values of every
      host in `kube-masters`, with no placeholders or duplicates.
