- name: Assert required runtime variables are defined
  ansible.builtin.assert:
    that:
      - vault_token is defined and vault_token | length > 0
      - github_pat is defined and github_pat | length > 0
    fail_msg: >-
      Missing required runtime variables. Run with:
      -e vault_token=... -e github_pat=...

- name: Assert kubeconfig artifact exists
  ansible.builtin.stat:
    path: "{{ kubeconfig }}"
  register: _argocd_kubeconfig_stat

- name: Fail if kubeconfig artifact is missing
  ansible.builtin.assert:
    that: _argocd_kubeconfig_stat.stat.exists
    fail_msg: >-
      Kubeconfig artifact not found at {{ kubeconfig }}.
      Run bootstrap stages first before deploying ArgoCD.

- name: Verify Vault is reachable
  ansible.builtin.uri:
    url: "{{ vault_addr }}/v1/sys/health"
    method: GET
    status_code: [200, 429, 472, 473, 501, 503]
  register: _vault_health

- name: Assert Vault is not sealed or uninitialized
  ansible.builtin.assert:
    that:
      - not _vault_health.json.sealed | default(true)
      - _vault_health.json.initialized | default(false)
    fail_msg: >-
      Vault at {{ vault_addr }} is sealed or uninitialized.
      Unseal Vault before running ArgoCD bootstrap.

- name: Verify Vault token is valid
  ansible.builtin.uri:
    url: "{{ vault_addr }}/v1/auth/token/lookup-self"
    method: GET
    headers:
      X-Vault-Token: "{{ vault_token }}"
    status_code: 200
  no_log: true
  register: _vault_token_lookup

- name: Assert Vault token has sufficient TTL
  ansible.builtin.assert:
    that: _vault_token_lookup.json.data.ttl | int > 300
    fail_msg: >-
      Vault token expires in less than 5 minutes (TTL: {{ _vault_token_lookup.json.data.ttl }}s).
      Provide a token with sufficient TTL.
