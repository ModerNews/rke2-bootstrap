# Local bootstrap artifacts — written from master-init, used by follow-up stages on localhost
bootstrap_artifact_dir: "{{ playbook_dir }}/../.artifacts/prod"
kubeconfig: "{{ bootstrap_artifact_dir }}/kubeconfig"
rke2_token_local_path: "{{ bootstrap_artifact_dir }}/node-token"
infra_helm_path: "{{ bootstrap_artifact_dir }}/infra-helm"

# --- VIP & API ---
rke2_vip: 10.1.1.10
rke2_api_fqdn: api.prod.k8s.internal.wmsdev.pl

# --- Master IPs (for tls-san) ---
rke2_master_ips:
  - 10.1.1.11
  - 10.1.1.12
  - 10.1.1.13

# --- Cluster networking ---
rke2_cluster_domain: prod.k8s.internal.wmsdev.pl
rke2_cluster_cidr: 10.110.0.0/16
rke2_service_cidr: 10.111.0.0/16

# --- VIP interface ---
vip_interface: eth0
vip_prefix: 24

# --- ArgoCD enrollment ---
# argocd_parent_kubeconfig: passed at runtime via -e or set here
argocd_cluster_group: prod
vault_k8s_auth_path: kubernetes-prod
