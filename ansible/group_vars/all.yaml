# Connection
ansible_user: wms
ansible_ssh_private_key_file: ~/.ssh/id_bastion

# --- Vault ---
vault_addr: https://api.vault.internal.wmsdev.pl:8200
vault_kv_mount: secret
vault_github_app_path: argocd/github-app
vault_argocd_secret_path: argocd/argocd-secret
# vault_token: passed at runtime via -e vault_token=...

# --- GitHub ---
# github_pat: passed at runtime via -e github_pat=...
infra_helm_repo: https://github.com/WMS-DEV/infra-helm.git
infra_helm_revision: argocd-rewrite

# --- Component versions ---
cilium_version: "1.19.3"
kube_vip_version: "v1.1.2"
