- name: Load bootstrap token from local artifact
  ansible.builtin.set_fact:
    rke2_token: "{{ lookup('ansible.builtin.file', rke2_token_local_path) | trim }}"
  no_log: true

- name: Create /etc/rancher/rke2 directory
  ansible.builtin.file:
    path: /etc/rancher/rke2
    state: directory
    mode: '0700'

- name: Create rke2 config file
  ansible.builtin.template:
    src: rke2/config/master-join.yaml.j2
    dest: /etc/rancher/rke2/config.yaml
    mode: '0600'

- name: Create /var/lib/rancher/rke2/agent/pod-manifests
  ansible.builtin.file:
    path: /var/lib/rancher/rke2/agent/pod-manifests
    state: directory
    mode: '0700'

- name: Create kube-vip manifest
  ansible.builtin.template:
    src: rke2/pod-manifests/kube-vip.yaml.j2
    dest: /var/lib/rancher/rke2/agent/pod-manifests/kube-vip.yaml
    mode: '0600'

- name: Install RKE2 server
  ansible.builtin.shell: |
    curl -sfL https://get.rke2.io | sh -

- name: Enable and start RKE2 server
  ansible.builtin.service:
    name: rke2-server
    state: started
    enabled: true

- name: Wait for Kubernetes node Ready
  kubernetes.core.k8s_info:
    kind: Node
    name: "{{ inventory_hostname }}"
    kubeconfig: "{{ kubeconfig }}"
  register: node_info
  until: >
    node_info.resources is defined and
    node_info.resources | length > 0 and
    (node_info.resources[0].status.conditions |
     selectattr('type', 'equalto', 'Ready') |
     selectattr('status', 'equalto', 'True') |
     list | length > 0)
  retries: 30
  delay: 10
  delegate_to: localhost
  become: false
