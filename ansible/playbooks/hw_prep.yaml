- name: Ensure system is reachable
  ansible.builtin.wait_for_connection:
    timeout: 300

- name: Wait for cloud-init to finish
  ansible.builtin.command: cloud-init status --wait
  changed_when: false
  register: cloud_init_output
  failed_when: cloud_init_output.rc != 0

- name: Set hostname
  ansible.builtin.hostname:
    name: "{{ inventory_hostname }}"

- name: Write modules-load.d config
  ansible.builtin.copy:
    dest: /etc/modules-load.d/99-rke2.conf
    owner: root
    group: root
    mode: '0644'
    content: |
      overlay
      br_netfilter

- name: Write sysctl config
  ansible.builtin.copy:
    dest: /etc/sysctl.d/99-rke2.conf
    owner: root
    group: root
    mode: '0644'
    content: |
      net.ipv4.ip_forward = 1
      net.bridge.bridge-nf-call-iptables = 1
      net.bridge.bridge-nf-call-ip6tables = 1
  notify: Apply rke2 sysctl settings

- name: Load required kernel modules
  community.general.modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - overlay
    - br_netfilter

- name: Write NetworkManager config
  ansible.builtin.copy:
    dest: /etc/NetworkManager/conf.d/99-cilium.conf
    owner: root
    group: root
    mode: '0644'
    content: |
      [keyfile]
      unmanaged-devices=interface-name:cilium*;interface-name:lxc*
  notify: Reload NetworkManager

- name: Check active swap devices
  ansible.builtin.command: swapon --show --noheadings
  register: active_swap
  changed_when: false

- name: Disable swap when active
  ansible.builtin.command: swapoff -a
  when: (active_swap.stdout | trim | length) > 0
  changed_when: true

- name: Remove swap entries from /etc/fstab
  ansible.builtin.lineinfile:
    path: /etc/fstab
    regexp: '^\s*[^#]+\s+\S+\s+swap\s+'
    state: absent
