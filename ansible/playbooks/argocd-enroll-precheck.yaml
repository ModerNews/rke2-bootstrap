- name: Assert argocd_parent_kubeconfig is defined and non-empty
  ansible.builtin.assert:
    that:
      - argocd_parent_kubeconfig is defined
      - argocd_parent_kubeconfig | length > 0
    fail_msg: >-
      argocd_parent_kubeconfig must be set (path to the parent ArgoCD cluster
      kubeconfig). Pass it via -e argocd_parent_kubeconfig=/path/to/parent.yaml
      or set it in group_vars/all.yaml.

- name: Stat argocd_parent_kubeconfig file
  ansible.builtin.stat:
    path: "{{ argocd_parent_kubeconfig }}"
  register: _parent_kubeconfig_stat

- name: Fail if argocd_parent_kubeconfig file does not exist
  ansible.builtin.fail:
    msg: >-
      argocd_parent_kubeconfig file not found: {{ argocd_parent_kubeconfig }}
  when: not _parent_kubeconfig_stat.stat.exists
