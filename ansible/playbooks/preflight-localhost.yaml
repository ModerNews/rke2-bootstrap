- name: Check git is installed on the controller
  ansible.builtin.shell: command -v git
  register: _git_binary
  changed_when: false
  failed_when: false

- name: Check helm is installed on the controller
  ansible.builtin.shell: command -v helm
  register: _helm_binary
  changed_when: false
  failed_when: false

- name: Check required Python libraries are installed for controller-side tasks
  ansible.builtin.command:
    argv:
      - "{{ ansible_playbook_python }}"
      - -c
      - "import kubernetes, hvac"
  register: _controller_python_libs
  changed_when: false
  failed_when: false

- name: Assert controller prerequisites exist
  ansible.builtin.assert:
    that:
      - _git_binary.rc == 0
      - _helm_binary.rc == 0
      - _controller_python_libs.rc == 0
    fail_msg: >-
      The controller is missing required bootstrap prerequisites. Ensure `git`,
      `helm`, and the Python libraries `kubernetes` and `hvac` are installed
      before running this automation.
