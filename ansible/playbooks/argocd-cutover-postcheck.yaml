- name: Verify cluster secret label was flipped to ready
  kubernetes.core.k8s_info:
    kubeconfig: "{{ kubeconfig }}"
    api_version: v1
    kind: Secret
    name: "{{ rke2_cluster_domain | replace('.', '-') }}"
    namespace: argocd
  register: _cluster_secret_info

- name: Assert bootstrap-stage label is ready
  ansible.builtin.assert:
    that: >-
      _cluster_secret_info.resources[0].metadata.labels['bootstrap-stage'] == 'ready'
    fail_msg: >-
      Cluster secret {{ rke2_cluster_domain | replace('.', '-') }} does not have
      bootstrap-stage=ready. Label flip may have failed.

- name: Wait for ApplicationSets to generate at least one Application
  kubernetes.core.k8s_info:
    kubeconfig: "{{ kubeconfig }}"
    api_version: argoproj.io/v1alpha1
    kind: Application
    namespace: argocd
  register: _all_applications
  until: >
    _all_applications.resources is defined and
    (_all_applications.resources | selectattr('metadata.ownerReferences', 'defined') | list | length) > 0
  retries: 12
  delay: 10

- name: Report generated Applications
  ansible.builtin.debug:
    msg: >-
      ApplicationSets have generated {{ _all_applications.resources
        | selectattr('metadata.ownerReferences', 'defined')
        | list | length }} Application(s). Bootstrap cutover complete.
