- name: Check hashicorp-vault namespace
  kubernetes.core.k8s_info:
    kubeconfig: "{{ kubeconfig }}"
    api_version: v1
    kind: Namespace
    name: hashicorp-vault
  register: _vault_namespace_info

- name: Create hashicorp-vault namespace
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig }}"
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: hashicorp-vault
  when: (_vault_namespace_info.resources | default([]) | length) == 0

- name: Check vault-token-reviewer ServiceAccount
  kubernetes.core.k8s_info:
    kubeconfig: "{{ kubeconfig }}"
    api_version: v1
    kind: ServiceAccount
    name: vault-token-reviewer
    namespace: hashicorp-vault
  register: _vault_sa_info

- name: Create vault-token-reviewer ServiceAccount
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig }}"
    definition:
      apiVersion: v1
      kind: ServiceAccount
      metadata:
        name: vault-token-reviewer
        namespace: hashicorp-vault
  when: (_vault_sa_info.resources | default([]) | length) == 0

- name: Check vault-token-reviewer ClusterRoleBinding
  kubernetes.core.k8s_info:
    kubeconfig: "{{ kubeconfig }}"
    api_version: rbac.authorization.k8s.io/v1
    kind: ClusterRoleBinding
    name: vault-token-reviewer
  register: _vault_crb_info

- name: Bind system:auth-delegator to vault-token-reviewer
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig }}"
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRoleBinding
      metadata:
        name: vault-token-reviewer
      roleRef:
        apiGroup: rbac.authorization.k8s.io
        kind: ClusterRole
        name: system:auth-delegator
      subjects:
        - kind: ServiceAccount
          name: vault-token-reviewer
          namespace: hashicorp-vault
  when: (_vault_crb_info.resources | default([]) | length) == 0

- name: Check vault-token-reviewer token secret
  kubernetes.core.k8s_info:
    kubeconfig: "{{ kubeconfig }}"
    kind: Secret
    name: vault-token-reviewer
    namespace: hashicorp-vault
  register: _reviewer_secret_info

- name: Assert existing vault-token-reviewer secret is well formed
  ansible.builtin.assert:
    that:
      - (_reviewer_secret_info.resources | default([]) | length) == 0 or _reviewer_secret_info.resources[0].type == 'kubernetes.io/service-account-token'
      - >
        (_reviewer_secret_info.resources | default([]) | length) == 0 or
        _reviewer_secret_info.resources[0].metadata.annotations['kubernetes.io/service-account.name'] == 'vault-token-reviewer'
    fail_msg: >-
      Existing `vault-token-reviewer` secret is malformed. Refusing to replace
      it automatically because that could rotate the reviewer token unexpectedly.

- name: Create vault-token-reviewer token secret
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig }}"
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: vault-token-reviewer
        namespace: hashicorp-vault
        annotations:
          kubernetes.io/service-account.name: vault-token-reviewer
      type: kubernetes.io/service-account-token
  when: (_reviewer_secret_info.resources | default([]) | length) == 0

- name: Wait for token to be populated
  kubernetes.core.k8s_info:
    kubeconfig: "{{ kubeconfig }}"
    kind: Secret
    name: vault-token-reviewer
    namespace: hashicorp-vault
  register: _reviewer_secret
  until: >
    _reviewer_secret.resources is defined and
    _reviewer_secret.resources | length > 0 and
    _reviewer_secret.resources[0].data.token is defined
  retries: 10
  delay: 5

- name: Extract token reviewer JWT
  ansible.builtin.set_fact:
    _vault_reviewer_jwt: "{{ _reviewer_secret.resources[0].data.token | b64decode }}"
  no_log: true

- name: Extract cluster CA cert
  ansible.builtin.set_fact:
    _k8s_ca_cert: >-
      {{ (lookup('ansible.builtin.file', kubeconfig) | from_yaml)
         .clusters[0].cluster['certificate-authority-data'] | b64decode }}

- name: Extract API server URL
  ansible.builtin.set_fact:
    _k8s_api_server: >-
      {{ (lookup('ansible.builtin.file', kubeconfig) | from_yaml)
         .clusters[0].cluster.server }}

- name: Enable Vault Kubernetes auth mount (idempotent)
  community.hashi_vault.vault_write:
    url: "{{ vault_addr }}"
    token: "{{ vault_token }}"
    path: "sys/auth/{{ vault_k8s_auth_path }}"
    data:
      type: kubernetes
  register: _vault_auth_enable
  failed_when:
    - _vault_auth_enable.failed
    - "'path is already in use' not in (_vault_auth_enable.msg | default(''))"
  no_log: true

- name: Configure Vault Kubernetes auth backend
  community.hashi_vault.vault_write:
    url: "{{ vault_addr }}"
    token: "{{ vault_token }}"
    path: "auth/{{ vault_k8s_auth_path }}/config"
    data:
      kubernetes_host: "{{ _k8s_api_server }}"
      kubernetes_ca_cert: "{{ _k8s_ca_cert }}"
      token_reviewer_jwt: "{{ _vault_reviewer_jwt }}"
  no_log: true
