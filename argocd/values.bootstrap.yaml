# Stub ArgoCD values — used by Ansible for initial installation
# Applied before bootstrap root; intentionally minimal
# Wave 4 (argocd.yaml) replaces this with full values.yaml from infra-helm

grafanaDashboards:
  enabled: false

repoServerPVCs:
  enabled: false

vaultSecrets: null  # VSO is not yet installed

argo-cd:
  configs:
    cm:
      admin.enabled: false
      # OIDC omitted — SSO not available during bootstrap
    params:
      server.insecure: true
    secret:
      # Do not create the secret. It doesn't contain any data useful during bootstrap, and it causes issues when ArgoCD tries to update it with the VSO secret down the line.
      createSecret: false

  controller:
    replicas: 1
    pdb:
      enabled: false
    metrics:
      enabled: false
      serviceMonitor:
        enabled: false
    vpa:
      enabled: false

  dex:
    enabled: false

  redis:
    metrics:
      enabled: false
      serviceMonitor:
        enabled: false

  server:
    replicas: 1
    autoscaling:
      enabled: false
    pdb:
      enabled: false
    metrics:
      enabled: false
      serviceMonitor:
        enabled: false
    ingress:
      enabled: false

  repoServer:
    replicas: 1
    autoscaling:
      enabled: false
    pdb:
      enabled: false
    existingVolumes: null
    useEphemeralHelmWorkingDir: true
    metrics:
      enabled: false
      serviceMonitor:
        enabled: false

  applicationSet:
    replicas: 1
    pdb:
      enabled: false
    metrics:
      enabled: false
      serviceMonitor:
        enabled: false

  notifications:
    enabled: false

  extraObjects:
    - apiVersion: v1
      kind: Secret
      metadata:
        name: tools-k8s-internal-wmsdev-pl
        namespace: argocd
        labels:
          argocd.argoproj.io/secret-type: cluster
          infrastructure.wmsdev.pl/cluster: tools.k8s.internal.wmsdev.pl
          infrastructure.wmsdev.pl/cluster-group: prod
          bootstrap-stage: enrolling
      type: Opaque
      stringData:
        name: tools.k8s.internal.wmsdev.pl
        server: https://kubernetes.default.svc
        config: '{"tlsClientConfig":{"insecure":false}}'
