apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bootstrap-tools
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/WMS-DEV/infra-helm.git
    targetRevision: argocd-rewrite
    path: .argocd/bootstrap/tools
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
