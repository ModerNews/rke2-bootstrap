apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: cilium
  namespace: kube-system
spec:
  repo: https://helm.cilium.io/
  chart: cilium
  version: "1.18.2"
  targetNamespace: kube-system
  bootstrap: true
  valuesContent: |-
    kubeProxyReplacement: true
    k8sServiceHost: "<VIP>"
    k8sServicePort: 6443

    # eth0 = pod network, eth1 = storage (Ceph)
    devices: "eth0"

    routingMode: tunnel
    tunnelProtocol: vxlan

    bpf:
      masquerade: true

    ipam:
      mode: cluster-pool
      operator:
        clusterPoolIPv4PodCIDRList:
          - "<CLUSTER_CIDR>"
        clusterPoolIPv4MaskSize: 24

    operator:
      replicas: 2
      tolerations:
        - operator: Exists

    enable-l7-proxy: false

    hubble:
      enabled: true
      relay:
        enabled: true
      peerService:
        clusterDomain: <CLUSTER_DOMAIN>
