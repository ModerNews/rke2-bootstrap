#cloud-config

# virtio1 (vdb) → /var/lib/rancher/rke2/server/db/etcd
# virtio2 (vdc) → /var/log

disk_setup:
  /dev/vdb:
    table_type: "gpt"
    overwrite: true
    layout: true
  /dev/vdc:
    table_type: "gpt"
    overwrite: true
    layout: true

fs_setup:
  - label: etcd
    filesystem: "xfs"
    device: "/dev/vdb1"
    overwrite: false
  - label: logs
    filesystem: "xfs"
    device: "/dev/vdc1"
    overwrite: false

mounts:
  - ["/dev/vdb1", "/var/lib/rancher/rke2/server/db/etcd", "xfs", "defaults,noatime,nofail", "0", "2"]
  - ["/dev/vdc1", "/var/log", "xfs", "defaults,nofail", "0", "2"]
